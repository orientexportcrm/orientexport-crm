<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrientExport CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D0D6B; --red: #CC0000; --navy-light: #1a1a8a;
  --bg: #F4F4F6; --white: #ffffff; --border: #E2E2E8;
  --text: #1a1a2e; --muted: #7a7a90;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.login-overlay { position:fixed; inset:0; background:#0D0D6B; z-index:999; display:flex; align-items:center; justify-content:center; }
.login-overlay.hidden { display:none; }
.login-box { background:#fff; border-radius:16px; padding:40px 44px; width:400px; text-align:center; }
.login-title { font-size:20px; font-weight:600; color:#0D0D6B; margin-bottom:4px; letter-spacing:1px; }
.login-sub { font-size:12px; color:#7a7a90; margin-bottom:28px; }
.login-form { display:flex; flex-direction:column; gap:12px; text-align:left; }
.login-label { font-size:11px; font-weight:600; color:#7a7a90; letter-spacing:0.5px; margin-bottom:4px; display:block; }
.login-input { width:100%; padding:11px 14px; border:1px solid #E2E2E8; border-radius:8px; font-size:14px; font-family:inherit; outline:none; }
.login-input:focus { border-color:#0D0D6B; }
.login-btn { background:#0D0D6B; color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:6px; }
.login-btn:hover { background:#1a1a8a; }
.login-error { color:#CC0000; font-size:12px; margin-top:6px; min-height:18px; }
.login-footer { font-size:11px; color:#b0b0c0; margin-top:20px; }

.header { background:var(--navy); color:#fff; padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
.header-brand { display:flex; align-items:center; gap:12px; }
.header-brand .dot { width:8px; height:8px; background:var(--red); border-radius:50%; }
.header-brand h1 { font-size:14px; font-weight:600; letter-spacing:2px; }
.header-brand span { font-size:11px; opacity:0.5; letter-spacing:1px; }
.header-right { display:flex; align-items:center; gap:12px; }
.user-dot { width:8px; height:8px; background:#4ade80; border-radius:50%; }
.user-name { font-size:12px; color:rgba(255,255,255,0.7); }
.btn-sm { padding:6px 14px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; border:none; font-family:inherit; }
.btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.3); color:#fff; }
.btn-outline:hover { background:rgba(255,255,255,0.1); }
.logout-btn { padding:5px 12px; background:transparent; border:1px solid rgba(255,255,255,0.25); color:#fff; border-radius:6px; font-size:11px; cursor:pointer; font-family:inherit; }

.tabs { background:var(--white); border-bottom:1px solid var(--border); padding:0 32px; display:flex; }
.tab { padding:14px 24px; font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); display:flex; align-items:center; gap:8px; }
.tab.active { color:var(--navy); border-bottom-color:var(--navy); }
.tab .count { background:var(--bg); border-radius:99px; padding:2px 8px; font-size:11px; font-family:'DM Mono',monospace; }
.tab.active .count { background:var(--navy); color:#fff; }

.main { padding:24px 32px; max-width:1400px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:16px 20px; }
.stat-label { font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0.5px; margin-bottom:6px; }
.stat-value { font-size:26px; font-weight:600; color:var(--navy); font-family:'DM Mono',monospace; }
.stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }

.toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; }
.toolbar-left { display:flex; gap:8px; flex:1; }
.search-input { flex:1; max-width:280px; padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; outline:none; background:var(--white); }
.search-input:focus { border-color:var(--navy); }
.filter-select { padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; outline:none; background:var(--white); cursor:pointer; }
.btn-add { background:var(--navy); color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
.btn-add:hover { background:var(--navy-light); }

.table-wrap { background:var(--white); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead th { background:#F8F8FC; padding:10px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--border); cursor:pointer; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:#F8F8FC; }
tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }
.td-name { font-weight:500; }
.td-company { color:var(--muted); font-size:12px; }

.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:500; white-space:nowrap; }
.badge-prospect { background:#EEF2FF; color:#3730a3; }
.badge-contattato { background:#FEF9C3; color:#854d0e; }
.badge-proposta { background:#FFF7ED; color:#c2410c; }
.badge-trattativa { background:#FEE2E2; color:#991b1b; }
.badge-mandato { background:#D1FAE5; color:#065f46; }
.badge-attivo { background:#DCFCE7; color:#166534; }
.badge-freddo { background:#F1F5F9; color:#475569; }
.badge-concluso { background:#F3F4F6; color:#374151; }
.badge-ru { background:#FEE2E2; color:#991b1b; }
.badge-by { background:#EDE9FE; color:#5b21b6; }
.badge-kz { background:#FEF3C7; color:#92400e; }
.badge-uz { background:#D1FAE5; color:#065f46; }

.priority { display:inline-flex; gap:3px; }
.priority-dot { width:6px; height:6px; border-radius:50%; background:var(--border); }
.priority-dot.filled { background:var(--red); }

.td-actions { display:flex; gap:6px; opacity:0; }
tr:hover .td-actions { opacity:1; }
.action-btn { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--white); font-family:inherit; }
.action-btn.del { border-color:#fecaca; color:#dc2626; }
.action-btn.del:hover { background:#fef2f2; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:14px; padding:28px; width:520px; max-height:90vh; overflow-y:auto; }
.modal-title { font-size:17px; font-weight:600; margin-bottom:20px; color:var(--navy); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-label { font-size:12px; font-weight:500; color:var(--muted); }
.form-input, .form-select, .form-textarea { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--navy); }
.form-textarea { resize:vertical; min-height:72px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.btn-cancel { padding:9px 18px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; background:var(--white); font-family:inherit; }
.btn-save { padding:9px 18px; background:var(--navy); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }

.loading { text-align:center; padding:60px 20px; color:var(--muted); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }

.notif { position:fixed; bottom:24px; right:24px; background:var(--navy); color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:500; z-index:300; transform:translateY(80px); opacity:0; transition:all 0.3s; }
.notif.show { transform:translateY(0); opacity:1; }
.notif.error { background:var(--red); }

.sync-badge { font-size:11px; color:rgba(255,255,255,0.6); display:flex; align-items:center; gap:5px; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; }
.sync-dot.syncing { background:#fbbf24; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>

        <select class="form-select" id="f-it-Stato"><option value="">Seleziona</option><option>Prospect</option><option>Contattato</option><option>Proposta inviata</option><option>Trattativa</option><option>Mandato firmato</option><option>Attivo</option><option>Freddo</option><option>Concluso</option></select>
      </div>
      <div class="form-group"><label class="form-label">PRIORITÀ</label>
        <select class="form-select" id="f-it-Priorità"><option value="">Seleziona</option><option>1-Bassa</option><option>2-Media</option><option>3-Alta</option></select>
      </div>
      <div class="form-group"><label class="form-label">EMAIL</label><input class="form-input" id="f-it-Email" type="email"></div>
      <div class="form-group"><label class="form-label">TELEFONO</label><input class="form-input" id="f-it-Telefono" placeholder="+39 ..."></div>
      <div class="form-group"><label class="form-label">ULTIMO CONTATTO</label><input class="form-input" id="f-it-Ultimo contatto" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('it')">Annulla</button>
      <button class="btn-save" onclick="saveLead('it')">Salva su Airtable</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
var AT_BASE = "appEe6WMBuSvrz11L";
var AT_CIS  = "tblZIEm1DAOybc6E0";
var AT_IT   = "tblQT74u6uSeddUGr";
var AT_URL  = "/api/airtable";

var USERS = {
  'direzione@orientexport.it': { pass: 'Oriente77@', name: 'Marco Silvestri' },
  'export@orientexport.it':    { pass: 'Oriente77@', name: 'Team Mosca' }
};

var CIS_FIELDS = ['Name','Azienda','Paese','Settore','Prodotto','Stato','Email','Telefono','Priorità','Ultimo contatto'];
var IT_FIELDS  = ['Nome','Azienda','Settore','Mercati Target','Stato','Priorità','Email','Telefono','Ultimo contatto'];

var data = { cis: [], it: [] };
var editId = { cis: null, it: null };
var currentUser = null;
var currentSection = 'cis';
var sortField = { cis: null, it: null };
var sortDir = { cis: 1, it: 1 };

function doLogin() {
  var u = document.getElementById('loginUser').value.trim().toLowerCase();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginError');
  var user = USERS[u];
  if (!user || user.pass !== p) { err.textContent = 'Credenziali non valide.'; return; }
  err.textContent = '';
  currentUser = { email: u, name: user.name };
  sessionStorage.setItem('oe_user', JSON.stringify(currentUser));
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('userLabel').textContent = currentUser.name;
  loadAll();
}

function doLogout() {
  sessionStorage.removeItem('oe_user');
  currentUser = null;
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginOverlay').classList.remove('hidden');
}

function checkSession() {
  try {
    var s = sessionStorage.getItem('oe_user');
    if (s) {
      currentUser = JSON.parse(s);
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('userLabel').textContent = currentUser.name;
      loadAll();
    }
  } catch(e) {}
}

document.getElementById('loginPass').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });

function tableId(type) { return type==='cis' ? AT_CIS : AT_IT; }

async function atFetch(path, method, body) {
  method = method || 'GET';
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(AT_URL + path, opts);
  if (!r.ok) { var txt = await r.text(); throw new Error(txt); }
  return r.json();
}

async function loadAll() {
  setSyncing(true);
  try {
    await Promise.all([loadTable('cis'), loadTable('it')]);
    setSyncing(false);
    renderAll();
  } catch(e) {
    setSyncing(false);
    notify('Errore connessione Airtable', true);
    console.error(e);
  }
}

async function loadTable(type) {
  var tid = tableId(type);
  var records = [];
  var offset = null;
  do {
    var url = '/' + AT_BASE + '/' + tid + '?pageSize=100' + (offset ? '&offset=' + offset : '');
    var res = await atFetch(url);
    records = records.concat(res.records || []);
    offset = res.offset || null;
  } while(offset);
  data[type] = records.map(function(r) {
    var obj = { id: r.id };
    var f = r.fields || {};
    Object.keys(f).forEach(function(k) { obj[k] = f[k]; });
    return obj;
  });
}

async function saveToAirtable(type, fields, recordId) {
  var tid = tableId(type);
  setSyncing(true);
  try {
    if (recordId) {
      await atFetch('/' + AT_BASE + '/' + tid + '/' + recordId, 'PATCH', { fields: fields });
    } else {
      await atFetch('/' + AT_BASE + '/' + tid, 'POST', { records: [{ fields: fields }] });
    }
    await loadTable(type);
    setSyncing(false);
    renderAll();
    notify(recordId ? 'Lead aggiornato' : 'Lead salvato');
  } catch(e) {
    setSyncing(false);
    notify('Errore: ' + e.message, true);
    console.error(e);
  }
}

async function deleteFromAirtable(type, recordId) {
  var tid = tableId(type);
  setSyncing(true);
  try {
    await atFetch('/' + AT_BASE + '/' + tid + '/' + recordId, 'DELETE');
    await loadTable(type);
    setSyncing(false);
    renderAll();
    notify('Lead eliminato');
  } catch(e) {
    setSyncing(false);
    notify('Errore eliminazione', true);
  }
}

function setSyncing(on) {
  document.getElementById('syncDot').className = 'sync-dot' + (on ? ' syncing' : '');
  document.getElementById('syncLabel').textContent = on ? 'Sincronizzazione...' : 'Airtable ✓';
}

function switchSection(type, el) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('section-' + type).classList.add('active');
  el.classList.add('active');
  currentSection = type;
  renderTable(type);
}

function statusBadge(s) {
  var map = {'Prospect':'badge-prospect','Contattato':'badge-contattato','Proposta inviata':'badge-proposta','Trattativa':'badge-trattativa','Mandato firmato':'badge-mandato','Attivo':'badge-attivo','Freddo':'badge-freddo','Concluso':'badge-concluso'};
  return s ? '<span class="badge ' + (map[s]||'') + '">' + s + '</span>' : '';
}

function countryBadge(c) {
  var map = {'Russia':'badge-ru','Bielorussia':'badge-by','Kazakhstan':'badge-kz','Uzbekistan':'badge-uz'};
  return c ? '<span class="badge ' + (map[c]||'') + '">' + c + '</span>' : '';
}

function priorityDots(p) {
  var n = p ? (parseInt(p.charAt(0)) || 1) : 1;
  var d = '';
  for (var i=1; i<=3; i++) d += '<span class="priority-dot' + (i<=n?' filled':'') + '"></span>';
  return '<span class="priority">' + d + '</span>';
}

function getFiltered(type) {
  var search = (document.getElementById('search-'+type)||{value:''}).value.toLowerCase();
  var status = (document.getElementById('filter-status-'+type)||{value:''}).value;
  var country = type==='cis' ? (document.getElementById('filter-country-cis')||{value:''}).value : '';
  var priority = type==='cis' ? (document.getElementById('filter-priority-cis')||{value:''}).value : (document.getElementById('filter-priority-it')||{value:''}).value;
  var filtered = data[type].filter(function(l) {
    var nf = type==='cis' ? 'Name' : 'Nome';
    var txt = ((l[nf]||'')+(l.Azienda||'')+(l.Paese||'')+(l.Settore||'')).toLowerCase();
    if (search && txt.indexOf(search)===-1) return false;
    if (status && l.Stato!==status) return false;
    if (country && l.Paese!==country) return false;
    if (priority && l['Priorità']!==priority) return false;
    return true;
  });
  if (sortField[type]) {
    var sf = sortField[type];
    var dir = sortDir[type];
    filtered.sort(function(a,b) {
      var av = (a[sf]||'').toString().toLowerCase();
      var bv = (b[sf]||'').toString().toLowerCase();
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  }
  return filtered;
}

function renderStats(type) {
  var leads = data[type];
  var total = leads.length;
  var active = leads.filter(function(l){return l.Stato==='Attivo'||l.Stato==='Mandato firmato';}).length;
  var tratt  = leads.filter(function(l){return l.Stato==='Trattativa'||l.Stato==='Proposta inviata';}).length;
  var hot    = leads.filter(function(l){return (l['Priorità']||'').charAt(0)==='3';}).length;
  var labels = type==='cis'
    ? [['BUYER TOTALI',total,''],['ATTIVI',active,'partnership avviate'],['IN TRATTATIVA',tratt,'da chiudere'],['PRIORITÀ ALTA',hot,'da seguire']]
    : [['CLIENTI TOTALI',total,''],['MANDATI ATTIVI',active,'in corso'],['IN TRATTATIVA',tratt,'proposta inviata'],['PRIORITÀ ALTA',hot,'da seguire']];
  document.getElementById('stats-'+type).innerHTML = labels.map(function(x){
    return '<div class="stat-card"><div class="stat-label">'+x[0]+'</div><div class="stat-value">'+x[1]+'</div>'+(x[2]?'<div class="stat-sub">'+x[2]+'</div>':'')+'</div>';
  }).join('');
}

function sortTable(type, field) {
  if (sortField[type] === field) { sortDir[type] *= -1; }
  else { sortField[type] = field; sortDir[type] = 1; }
  renderTable(type);
}
function sortArrow(type, field) {
  if (sortField[type] !== field) return ' <span style="color:#ccc;font-size:10px;">&#8597;</span>';
  return sortDir[type] === 1 ? ' <span style="color:#0D0D6B;font-size:10px;">&#8593;</span>' : ' <span style="color:#0D0D6B;font-size:10px;">&#8595;</span>';
}
function renderTable(type) {
  renderStats(type);
  document.getElementById('count-'+type).textContent = data[type].length;
  var leads = getFiltered(type);
  var wrap = document.getElementById('view-'+type);
  if (!leads.length) { wrap.innerHTML = '<div class="empty">Nessun lead trovato</div>'; return; }
  var nf = type==='cis' ? 'Name' : 'Nome';
  var rows = leads.map(function(l) {
    var nm = l[nf]||'';
    var az = l.Azienda||'';
    var pr = priorityDots(l['Priorità']);
    var st = statusBadge(l.Stato);
    var uc = l['Ultimo contatto']||'—';
    var id = l.id;
    if (type==='cis') {
      return '<tr onclick="editLead(\'cis\',\''+id+'\')">' +
        '<td><div class="td-name">'+nm+'</div><div class="td-company">'+az+'</div></td>' +
        '<td>'+countryBadge(l.Paese)+'</td>' +
        '<td style="font-size:12px;color:var(--muted)">'+(l.Settore||'—')+'</td>' +
        '<td style="font-size:12px;color:var(--muted)">'+(l.Prodotto||'—')+'</td>' +
        '<td>'+st+'</td><td>'+pr+'</td>' +
        '<td style="font-size:12px;color:var(--muted)">'+uc+'</td>' +
        '<td><div class="td-actions">' +
        '<button class="action-btn" onclick="event.stopPropagation();editLead(\'cis\',\''+id+'\')">Modifica</button>' +
        '<button class="action-btn del" onclick="event.stopPropagation();deleteLead(\'cis\',\''+id+'\')">Elimina</button>' +
        '</div></td></tr>';
    } else {
      return '<tr onclick="editLead(\'it\',\''+id+'\')">' +
        '<td><div class="td-name">'+nm+'</div><div class="td-company">'+az+'</div></td>' +
        '<td style="font-size:12px;color:var(--muted)">'+(l.Settore||'—')+'</td>' +
        '<td style="font-size:12px;color:var(--muted)">'+(l['Mercati Target']||'—')+'</td>' +
        '<td>'+st+'</td><td>'+pr+'</td>' +
        '<td style="font-size:12px;color:var(--muted)">'+uc+'</td>' +
        '<td><div class="td-actions">' +
        '<button class="action-btn" onclick="event.stopPropagation();editLead(\'it\',\''+id+'\')">Modifica</button>' +
        '<button class="action-btn del" onclick="event.stopPropagation();deleteLead(\'it\',\''+id+'\')">Elimina</button>' +
        '</div></td></tr>';
    }
  }).join('');
  var hd = buildHeaders(type);
  wrap.innerHTML = '<div class="table-wrap"><table>'+hd+'<tbody>'+rows+'</tbody></table></div>';
}

function th(type, field, label) {
  return '<th style="cursor:pointer;user-select:none;" onclick="sortTable(\'' + type + '\',\'' + field + '\')">' + label + sortArrow(type, field) + '</th>';
}
function buildHeaders(type) {
  if (type === 'cis') {
    return '<thead><tr>' +
      th('cis','Name','NOME') +
      th('cis','Paese','PAESE') +
      th('cis','Settore','SETTORE') +
      th('cis','Prodotto','PRODOTTO') +
      th('cis','Stato','STATO') +
      th('cis','Priorità','PRIORITÀ') +
      th('cis','Ultimo contatto','ULT.CONTATTO') +
      '<th></th></tr></thead>';
  } else {
    return '<thead><tr>' +
      th('it','Nome','NOME') +
      th('it','Settore','SETTORE') +
      th('it','Mercati Target','MERCATI TARGET') +
      th('it','Stato','STATO') +
      th('it','Priorità','PRIORITÀ') +
      th('it','Ultimo contatto','ULT.CONTATTO') +
      '<th></th></tr></thead>';
  }
}
function renderAll() { renderTable('cis'); renderTable('it'); }

function openModal(type, id) {
  editId[type] = id || null;
  var fields = type==='cis' ? CIS_FIELDS : IT_FIELDS;
  document.getElementById('modal-'+type+'-title').textContent = id ? 'Modifica Lead' : (type==='cis' ? 'Nuovo Buyer CIS' : 'Nuovo Cliente Italia');
  fields.forEach(function(f) {
    var el = document.getElementById('f-'+type+'-'+f);
    if (el) el.value = '';
  });
  if (id) {
    var lead = null;
    for (var i=0; i<data[type].length; i++) { if (data[type][i].id===id) { lead=data[type][i]; break; } }
    if (lead) {
      fields.forEach(function(f) {
        var el = document.getElementById('f-'+type+'-'+f);
        if (el && lead[f]!==undefined && lead[f]!==null) el.value = lead[f];
      });
    }
  }
  document.getElementById('modal-'+type).classList.add('open');
}

function closeModal(type) {
  document.getElementById('modal-'+type).classList.remove('open');
  editId[type] = null;
}

function saveLead(type) {
  var fields = type==='cis' ? CIS_FIELDS : IT_FIELDS;
  var nf = type==='cis' ? 'Name' : 'Nome';
  var nameEl = document.getElementById('f-'+type+'-'+nf);
  if (!nameEl || !nameEl.value.trim()) { notify('Il campo Nome è obbligatorio', true); return; }
  var payload = {};
  fields.forEach(function(f) {
    var el = document.getElementById('f-'+type+'-'+f);
    if (el && el.value.trim()) payload[f] = el.value.trim();
  });
  var recId = editId[type];
  saveToAirtable(type, payload, recId);
  closeModal(type);
}

function editLead(type, id) { openModal(type, id); }

function deleteLead(type, id) {
  if (!confirm('Eliminare questo lead da Airtable?')) return;
  deleteFromAirtable(type, id);
}

function exportCSV() {
  var leads = data[currentSection];
  if (!leads.length) { notify('Nessun dato', true); return; }
  var keys = Object.keys(leads[0]).filter(function(k){return k!=='id';});
  var rows = leads.map(function(l){return keys.map(function(k){return '"'+(l[k]||'').toString().replace(/"/g,'""')+'"';}).join(',');});
  var csv = [keys.join(',')].concat(rows).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'OrientExport_CRM_'+currentSection.toUpperCase()+'_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  notify('CSV esportato');
}

function notify(msg, isError) {
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.className = 'notif show'+(isError?' error':'');
  setTimeout(function(){n.className='notif';},3000);
}

document.querySelectorAll('.modal-overlay').forEach(function(m){
  m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});
});

checkSession();
</script>
</body>
</html>
